[General]
# Background image for the greeter. Replace with your own wallpaper if desired.
background=assets/wallpaper.png
# Fill | Aspect | Tile | Stretch
scaleMode=Fill
# Gaussian blur radius applied to the background (0 disables).
blurRadius=48
# Font family (matches the desktop default).
font=Google Sans Flex
# Clock format (Qt date/time format).
clockFormat=hh:mm
dateFormat=dddd, MMMM d
