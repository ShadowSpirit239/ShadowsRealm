exec = hyprctl dispatch submap global
submap = global

# ShadowsRealm keybinds.
# Binds that should appear in the cheat sheet use Hyprland's `bindd` (description)
# form with a "Category: Description" label. The cheat sheet (Super+/) reads
# `hyprctl binds -j` and groups entries by the text before the first ":".

# ## Shell keybinds
# Launcher (Super tap). Left as bindi/bindin; not shown in cheat sheet.
bindi = Super, Super_L, global, caelestia:launcher
bindin = Super, catchall, global, caelestia:launcherInterrupt
bindin = Super, mouse:272, global, caelestia:launcherInterrupt
bindin = Super, mouse:273, global, caelestia:launcherInterrupt
bindin = Super, mouse:274, global, caelestia:launcherInterrupt
bindin = Super, mouse:275, global, caelestia:launcherInterrupt
bindin = Super, mouse:276, global, caelestia:launcherInterrupt
bindin = Super, mouse:277, global, caelestia:launcherInterrupt
bindin = Super, mouse_up, global, caelestia:launcherInterrupt
bindin = Super, mouse_down, global, caelestia:launcherInterrupt

# Misc
bindd = $kbSession, Shell: Session menu (logout/reboot/shutdown), global, caelestia:session
bindd = $kbShowSidebar, Shell: Toggle notifications sidebar, global, caelestia:sidebar
binddl = $kbClearNotifs, Shell: Clear notifications, global, caelestia:clearNotifs
bindd = $kbShowPanels, Shell: Show all panels, global, caelestia:showall
bindd = $kbLock, Shell: Lock screen, global, caelestia:lock

# ## ShadowsRealm: AI sidebar + cheat sheet (served by the minimal `ii` instance)
bindd = $kbAiSidebar, AI: Toggle AI sidebar (Cursor/Gemini/OpenAI/Mistral/Ollama), exec, qs -c ii ipc call sidebarLeft toggle
bindd = $kbCheatsheet, Shell: Toggle this keybind cheat sheet, exec, qs -c ii ipc call cheatsheet toggle

# Restore lock
bindl = $kbRestoreLock, exec, caelestia shell -d
bindl = $kbRestoreLock, global, caelestia:lock

# Brightness
binddl = , XF86MonBrightnessUp, Media: Brightness up, global, caelestia:brightnessUp
binddl = , XF86MonBrightnessDown, Media: Brightness down, global, caelestia:brightnessDown

# Media
binddl = Ctrl+Super, Space, Media: Play/pause, global, caelestia:mediaToggle
bindl = , XF86AudioPlay, global, caelestia:mediaToggle
bindl = , XF86AudioPause, global, caelestia:mediaToggle
binddl = Ctrl+Super, Equal, Media: Next track, global, caelestia:mediaNext
bindl = , XF86AudioNext, global, caelestia:mediaNext
binddl = Ctrl+Super, Minus, Media: Previous track, global, caelestia:mediaPrev
bindl = , XF86AudioPrev, global, caelestia:mediaPrev
bindl = , XF86AudioStop, global, caelestia:mediaStop

# Kill/restart
binddr = Ctrl+Super+Shift, R, Shell: Restart shell, exec, qs -c caelestia kill
bindr = Ctrl+Super+Alt, R, exec, qs -c caelestia kill; sleep .1; caelestia shell -d

# Go to workspace #
$wsaction = ~/.config/hypr/scripts/wsaction.fish
bindd = $kbGoToWs, 1, Workspace: Go to workspace [1-10], exec, $wsaction workspace 1
bind = $kbGoToWs, 2, exec, $wsaction workspace 2
bind = $kbGoToWs, 3, exec, $wsaction workspace 3
bind = $kbGoToWs, 4, exec, $wsaction workspace 4
bind = $kbGoToWs, 5, exec, $wsaction workspace 5
bind = $kbGoToWs, 6, exec, $wsaction workspace 6
bind = $kbGoToWs, 7, exec, $wsaction workspace 7
bind = $kbGoToWs, 8, exec, $wsaction workspace 8
bind = $kbGoToWs, 9, exec, $wsaction workspace 9
bind = $kbGoToWs, 0, exec, $wsaction workspace 10
# Go to workspace group #
bindd = $kbGoToWsGroup, 1, Workspace: Go to workspace group [1-10], exec, $wsaction -g workspace 1
bind = $kbGoToWsGroup, 2, exec, $wsaction -g workspace 2
bind = $kbGoToWsGroup, 3, exec, $wsaction -g workspace 3
bind = $kbGoToWsGroup, 4, exec, $wsaction -g workspace 4
bind = $kbGoToWsGroup, 5, exec, $wsaction -g workspace 5
bind = $kbGoToWsGroup, 6, exec, $wsaction -g workspace 6
bind = $kbGoToWsGroup, 7, exec, $wsaction -g workspace 7
bind = $kbGoToWsGroup, 8, exec, $wsaction -g workspace 8
bind = $kbGoToWsGroup, 9, exec, $wsaction -g workspace 9
bind = $kbGoToWsGroup, 0, exec, $wsaction -g workspace 10
# Go to workspace -1/+1
bind = Super, mouse_down, workspace, -1
bind = Super, mouse_up, workspace, +1
bindde = $kbPrevWs, Workspace: Previous workspace, workspace, -1
bindde = $kbNextWs, Workspace: Next workspace, workspace, +1
binde = Super, Page_Up, workspace, -1
binde = Super, Page_Down, workspace, +1
# Go to workspace group -1/+1
bind = Ctrl+Super, mouse_down, workspace, -10
bind = Ctrl+Super, mouse_up, workspace, +10
# Toggle special workspace
bindd = $kbToggleSpecialWs, Workspace: Toggle special workspace, exec, caelestia toggle specialws

# Move window to workspace #
bindd = $kbMoveWinToWs, 1, Window: Move to workspace [1-10], exec, $wsaction movetoworkspace 1
bind = $kbMoveWinToWs, 2, exec, $wsaction movetoworkspace 2
bind = $kbMoveWinToWs, 3, exec, $wsaction movetoworkspace 3
bind = $kbMoveWinToWs, 4, exec, $wsaction movetoworkspace 4
bind = $kbMoveWinToWs, 5, exec, $wsaction movetoworkspace 5
bind = $kbMoveWinToWs, 6, exec, $wsaction movetoworkspace 6
bind = $kbMoveWinToWs, 7, exec, $wsaction movetoworkspace 7
bind = $kbMoveWinToWs, 8, exec, $wsaction movetoworkspace 8
bind = $kbMoveWinToWs, 9, exec, $wsaction movetoworkspace 9
bind = $kbMoveWinToWs, 0, exec, $wsaction movetoworkspace 10
# Move window to workspace group #
bind = $kbMoveWinToWsGroup, 1, exec, $wsaction -g movetoworkspace 1
bind = $kbMoveWinToWsGroup, 2, exec, $wsaction -g movetoworkspace 2
bind = $kbMoveWinToWsGroup, 3, exec, $wsaction -g movetoworkspace 3
bind = $kbMoveWinToWsGroup, 4, exec, $wsaction -g movetoworkspace 4
bind = $kbMoveWinToWsGroup, 5, exec, $wsaction -g movetoworkspace 5
bind = $kbMoveWinToWsGroup, 6, exec, $wsaction -g movetoworkspace 6
bind = $kbMoveWinToWsGroup, 7, exec, $wsaction -g movetoworkspace 7
bind = $kbMoveWinToWsGroup, 8, exec, $wsaction -g movetoworkspace 8
bind = $kbMoveWinToWsGroup, 9, exec, $wsaction -g movetoworkspace 9
bind = $kbMoveWinToWsGroup, 0, exec, $wsaction -g movetoworkspace 10
# Move window to workspace -1/+1
binde = Super+Alt, Page_Up, movetoworkspace, -1
binde = Super+Alt, Page_Down, movetoworkspace, +1
bind = Super+Alt, mouse_down, movetoworkspace, -1
bind = Super+Alt, mouse_up, movetoworkspace, +1
binde = Ctrl+Super+Shift, right, movetoworkspace, +1
binde = Ctrl+Super+Shift, left, movetoworkspace, -1
# Move window to/from special workspace
bind = Ctrl+Super+Shift, up, movetoworkspace, special:special
bind = Ctrl+Super+Shift, down, movetoworkspace, e+0
bindd = Super+Alt, S, Window: Move to special workspace, movetoworkspace, special:special

# Window groups
bindde = $kbWindowGroupCycleNext, Group: Cycle to next window in group, cyclenext
bindde = $kbWindowGroupCyclePrev, Group: Cycle to previous window in group, cyclenext, prev
binde = Ctrl+Alt, Tab, changegroupactive, f
binde = Ctrl+Shift+Alt, Tab, changegroupactive, b
bindd = $kbToggleGroup, Group: Toggle group, togglegroup
bindd = $kbUngroup, Group: Move out of group, moveoutofgroup
bindd = Super+Shift, Comma, Group: Lock active group, lockactivegroup, toggle

# Window actions
bindd = Super, left, Window: Focus left, movefocus, l
bindd = Super, right, Window: Focus right, movefocus, r
bindd = Super, up, Window: Focus up, movefocus, u
bindd = Super, down, Window: Focus down, movefocus, d
bindd = Super+Shift, left, Window: Move left, movewindow, l
bind = Super+Shift, right, movewindow, r
bind = Super+Shift, up, movewindow, u
bind = Super+Shift, down, movewindow, d
bindde = Super, Minus, Window: Resize (Super +/- and Super+Alt arrows), resizeactive, -10% 0
binde = Super, Equal, resizeactive, 10% 0
binde = Super+Shift, Minus, resizeactive, 0 -10%
binde = Super+Shift, Equal, resizeactive, 0 10%
binde = Super+Alt, left, resizeactive, -10% 0
binde = Super+Alt, right, resizeactive, 10% 0
binde = Super+Alt, up, resizeactive, 0 -10%
binde = Super+Alt, down, resizeactive, 0 10%
bindm = Super, mouse:272, movewindow
bindm = $kbMoveWindow, movewindow
bindm = Super, mouse:273, resizewindow
bindm = $kbResizeWindow, resizewindow
bind = Ctrl+Super, Backslash, centerwindow, 1
bind = Ctrl+Super+Alt, Backslash, resizeactive, exact 55% 70%
bind = Ctrl+Super+Alt, Backslash, centerwindow, 1
bindd = $kbWindowPip, Window: Picture-in-picture, exec, caelestia resizer pip
bindd = $kbPinWindow, Window: Pin window, pin
bindd = $kbWindowFullscreen, Window: Fullscreen, fullscreen, 0
bindd = $kbWindowBorderedFullscreen, Window: Fullscreen with borders, fullscreen, 1
bindd = $kbToggleWindowFloating, Window: Toggle floating, togglefloating,
bindd = $kbCloseWindow, Window: Close window, killactive,

# Layout / tiling
bindd = Super, J, Layout: Toggle split direction, togglesplit
bindd = Super, O, Layout: Toggle pseudotile, pseudo
bindd = Super+Shift, J, Layout: Swap split ratio, layoutmsg, swapsplit

# Multi-monitor
bindd = Super+Ctrl, Comma, Monitor: Focus previous monitor, focusmonitor, l
bindd = Super+Ctrl, Period, Monitor: Focus next monitor, focusmonitor, r
bindd = Super+Ctrl+Shift, Comma, Monitor: Move window to previous monitor, movewindow, mon:l
bindd = Super+Ctrl+Shift, Period, Monitor: Move window to next monitor, movewindow, mon:r

# Special workspace toggles
bindd = $kbSystemMonitor, Apps: Toggle system monitor, exec, caelestia toggle sysmon
bindd = $kbMusic, Apps: Toggle music, exec, caelestia toggle music
bindd = $kbCommunication, Apps: Toggle communication, exec, caelestia toggle communication
bindd = $kbTodo, Apps: Toggle todo, exec, caelestia toggle todo

# Apps
bindd = $kbTerminal, Apps: Terminal, exec, app2unit -- $terminal
bindd = $kbBrowser, Apps: Browser, exec, app2unit -- $browser
bindd = $kbEditor, Apps: Editor, exec, app2unit -- $editor
bindd = Super, G, Apps: GitHub Desktop, exec, app2unit -- github-desktop
bindd = $kbFileExplorer, Apps: File explorer, exec, app2unit -- $fileExplorer
bindd = Super+Alt, E, Apps: Nemo file manager, exec, app2unit -- nemo
bindd = Ctrl+Alt, Escape, Apps: System process viewer (qps), exec, app2unit -- qps
bindd = Ctrl+Alt, V, Apps: Volume control (pavucontrol), exec, app2unit -- pavucontrol

# Apps (ShadowsRealm bundled suite)
bindd = $kbDiscord, Apps: Discord (WebCord), exec, app2unit -- webcord
bindd = $kbOffice, Apps: LibreOffice, exec, app2unit -- libreoffice
bindd = $kbPdfViewer, Apps: PDF viewer (zathura), exec, app2unit -- zathura
bindd = $kbImageViewer, Apps: Image viewer (loupe), exec, app2unit -- loupe
bindd = $kbMediaPlayer, Apps: Media player (mpv), exec, app2unit -- mpv
bindd = $kbArchiveManager, Apps: Archive manager (ark), exec, app2unit -- ark
bindd = $kbCalculator, Apps: Calculator, exec, app2unit -- gnome-calculator
bindd = , XF86Calculator, Apps: Calculator, exec, app2unit -- gnome-calculator

# Utilities
binddl = , Print, Utilities: Screenshot full screen to clipboard, exec, caelestia screenshot
bindd = Super+Shift, S, Utilities: Screenshot region (freeze), global, caelestia:screenshotFreeze
bindd = Super+Shift+Alt, S, Utilities: Screenshot region, global, caelestia:screenshot
bindd = Super+Alt, R, Utilities: Record screen with sound, exec, caelestia record -s
bindd = Ctrl+Alt, R, Utilities: Record screen, exec, caelestia record
bindd = Super+Shift+Alt, R, Utilities: Record region, exec, caelestia record -r
bindd = Super+Shift, C, Utilities: Color picker, exec, hyprpicker -a

# Volume
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binddl = Super+Shift, M, Audio: Mute output, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86AudioRaiseVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ $volumeStep%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume @DEFAULT_AUDIO_SINK@ $volumeStep%-

# Sleep
binddl = Super+Shift, L, Session: Suspend then hibernate, exec, systemctl suspend-then-hibernate

# Clipboard and emoji picker
bindd = Super, V, Utilities: Clipboard history, exec, pkill fuzzel || caelestia clipboard
bindd = Super+Alt, V, Utilities: Clipboard history (delete mode), exec, pkill fuzzel || caelestia clipboard -d
bindd = Super, Period, Utilities: Emoji picker, exec, pkill fuzzel || caelestia emoji -p
bindl = Ctrl+Shift+Alt, V, exec, sleep 0.5s && ydotool type -d 1 "$(cliphist list | head -1 | cliphist decode)"

# Testing
bindl = Super+Alt, f12, exec, notify-send -u low -i dialog-information-symbolic 'Test notification' "Here's a really long message to test truncation and wrapping\nYou can middle click or flick this notification to dismiss it!" -a 'Shell' -A "Test1=I got it!" -A "Test2=Another action"
